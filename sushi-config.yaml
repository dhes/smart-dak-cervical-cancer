name: CervicalCancerDAK
title: "WHO SMART DAK — Cervical Cancer Screening (L2)"
description: >-
  Layer 2 (decision logic) artifacts for cervical cancer screening,
  Algorithm 5 (HPV DNA primary with VIA triage), authored using
  a textualist/purposive methodology with an interpretation register.
  L3 (FHIR profiles, CQL, terminology bindings) not yet authored.
